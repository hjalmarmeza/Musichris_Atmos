<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusiChris Studio | Atmos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- BACKGROUND BLINDADO (Sin Botón Play) -->
    <div class="video-bg">
        <video autoplay muted loop playsinline id="bg-video" poster="assets/landscapes/poster.jpg">
            <source src="assets/landscapes/fondo humo azul.mp4" type="video/mp4">
        </video>
    </div>

    <div class="master-container">
        <!-- Logo de Cuadro -->
        <img src="assets/logo_atmos.png" class="logo-img" alt="Atmos Logo">

        <!-- Título Cinzel -->
        <h1>MUSICHRIS <span>STUDIO</span></h1>

        <!-- Pestañas Píldora -->
        <nav class="nav-pill">
            <button class="nav-btn active" data-view="dashboard">PANEL</button>
            <button class="nav-btn" data-view="catalog">TEMAS</button>
            <button class="nav-btn" data-view="renders">HISTORIAL</button>
        </nav>

        <!-- DASHBOARD (PANEL) -->
        <main id="dashboard" class="view active">
            <div class="status-info">
                <p>Potencial: <span id="video-potential">CONSULTANDO NUBE...</span></p>
            </div>

            <div class="form-group" style="display: flex; flex-direction: column; gap: 25px; width: 100%;">
                
                <!-- Atmósfera -->
                <div class="input-wrapper">
                    <label class="input-label">ATMÓSFERA MINISTERIAL</label>
                    <select id="playlist-selector" class="input-box">
                        <option value="Confianza">Confianza & Fe</option>
                        <option value="Paz">Paz Interior</option>
                        <option value="Victoria">Victoria & Gozo</option>
                        <option value="Guerra">Guerra Espiritual</option>
                    </select>
                </div>

                <!-- Duración -->
                <div class="input-wrapper">
                    <label class="input-label">DURACIÓN DE PRODUCCIÓN</label>
                    <select id="duration-selector" class="input-box">
                        <option value="1800">30 MINUTOS (Standard)</option>
                        <option value="3600" selected>1 HORA (Premium)</option>
                        <option value="7200">2 HORAS (Majestic)</option>
                    </select>
                </div>

                <!-- Estilo Visual -->
                <div class="input-wrapper">
                    <label class="input-label">ESTILO CINEMATOGRÁFICO</label>
                    <select id="style-selector" class="input-box">
                        <option value="humo">Humo Azul (Atmos Core)</option>
                        <option value="paisaje">Paisajes Épicos</option>
                        <option value="abstracto">Partículas Abstractas</option>
                    </select>
                </div>

                <button id="btn-launch" class="btn-main">
                    INICIAR PRODUCCIÓN V6.2
                </button>
                
                <p id="current-title" style="text-align:center; margin-top:10px; font-size:0.7rem; opacity:0.4; letter-spacing:2px;">Sincronizado con Motor Oracle</p>
            </div>
        </main>

        <!-- TEMAS -->
        <section id="catalog" class="view">
            <div id="catalog-container" class="list-container"></div>
        </section>

        <!-- HISTORIAL -->
        <section id="renders" class="view">
            <div id="renders-container" class="list-container"></div>
        </section>
    </div>

    <script src="main.js"></script>
</body>
</html>
