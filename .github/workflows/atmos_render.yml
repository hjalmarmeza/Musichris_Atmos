name: MusiChris Atmos Diamond Render

on:
  repository_dispatch:
    types: [run-atmos]

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          pip install Pillow requests google-auth-oauthlib google-api-python-client google-auth-httplib2

      - name: Prepare Workspace
        run: |
          mkdir -p renders
          mkdir -p assets
          # Crear client_secrets.json desde el secreto de GitHub
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > scripts/client_secrets.json
          # Crear token.pickle si existe (opcional, si no, hará el flow de auth)
          # Pero mejor usar refresh tokens en el secreto

      - name: Run Atmos Engine
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          python3 scripts/atmos_engine.py "${{ github.event.client_payload.duration }}" "${{ github.event.client_payload.theme }}"

      - name: Upload Logs/Renders as Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atmos-production-package
          path: |
            renders/
            data/usage_history.json

      - name: Persist History (Commit & Push)
        if: success()
        run: |
          git config --global user.name "MusiChris Bot"
          git config --global user.email "bot@musichris.com"
          git add data/usage_history.json
          git commit -m "💎 Sync: Atmos Production History Update [skip ci]" || echo "No changes to commit"
          git push origin main
