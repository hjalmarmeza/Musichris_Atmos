<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusiChris Studio | Atmos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- BACKGROUND BLINDADO (Sin Botón Play) -->
    <div class="video-bg">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="assets/landscapes/fondo_humo_azul.mp4" type="video/mp4">
        </video>
    </div>

    <div class="master-container">
        <!-- Logo de Cuadro -->
        <img src="assets/logo_atmos.png" class="logo-img" alt="Atmos Logo">

        <!-- Título Cinzel -->
        <h1>MUSICHRIS <span>STUDIO</span></h1>

        <!-- Pestañas Píldora -->
        <nav class="nav-pill">
            <button class="nav-btn active" data-view="dashboard">PANEL</button>
            <button class="nav-btn" data-view="catalog">TEMAS</button>
            <button class="nav-btn" data-view="renders">HISTORIAL</button>
        </nav>

        <!-- DASHBOARD (PANEL) -->
        <main id="dashboard" class="view active">
            <div class="status-info">
                <p>Potencial: <span id="video-potential">LISTO (Playlist Variada)</span></p>
            </div>

            <div class="form-group">
                <input type="text" id="song-url-input" placeholder="Pegar link de canción aquí..." class="input-box">
                
                <div style="position:relative; width:100%;">
                    <select id="playlist-selector" class="input-box" style="appearance: none; -webkit-appearance: none;">
                        <option value="Confianza">Confianza & Fe</option>
                        <option value="Paz">Paz Interior</option>
                        <option value="Victoria">Victoria & Gozo</option>
                    </select>
                </div>

                <button id="btn-launch" class="btn-main">
                    INICIAR PRODUCCIÓN
                </button>
                
                <!-- Título dinámico para el Panel -->
                <p id="current-title" style="text-align:center; margin-top:10px; font-size:0.8rem; opacity:0.5;">Producción: Confianza</p>
            </div>
        </main>

        <!-- TEMAS -->
        <section id="catalog" class="view">
            <div id="catalog-container" class="list-container"></div>
        </section>

        <!-- HISTORIAL -->
        <section id="renders" class="view">
            <div id="renders-container" class="list-container"></div>
        </section>
    </div>

    <script src="main.js"></script>
</body>
</html>
