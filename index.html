<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmos Master Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="video-master">
        <video autoplay muted loop playsinline poster="assets/landscapes/poster_humo.jpg">
            <source src="assets/landscapes/fondo_humo_azul.mp4" type="video/mp4">
        </video>
    </div>
    <div class="video-overlay"></div>

    <div class="atmos-card">
        <div id="system-status-badge" class="status-indicator">STANDBY</div>
        
        <header>
            <div class="logo-container">
                <div class="logo-box">MC</div>
            </div>
            <h1>MusiChris <span>Atmos</span></h1>
            <p class="subtitle">Soberanía Digital Ministerial</p>
        </header>

        <main id="dashboard" class="view active">
            <div class="main-section">
                <div class="display-box">
                    <span class="tiny-label">ATMÓSFERA ACTUAL</span>
                    <h2 id="current-title" class="main-value">Confianza & Fe</h2>
                </div>

                <div class="form-group">
                    <div class="input-field">
                        <span class="tiny-label">URL DE LA CANCIÓN</span>
                        <input type="text" id="song-url-input" placeholder="Pegar link de YouTube...">
                    </div>

                    <div class="input-field">
                        <span class="tiny-label">TEMA DE RENDERIZADO</span>
                        <select id="playlist-selector">
                            <option value="Confianza">Confianza & Fe</option>
                            <option value="Paz">Paz Interior</option>
                            <option value="Victoria">Victoria & Gozo</option>
                            <option value="Guerra">Guerra Espiritual</option>
                        </select>
                    </div>
                </div>

                <button id="btn-launch" class="btn-launch">
                    INICIAR PRODUCCIÓN
                </button>
            </div>
        </main>

        <section id="renders" class="view">
            <span class="tiny-label">HISTORIAL DE NUBE</span>
            <div id="renders-container" class="grid-container" style="margin-top:15px;"></div>
        </section>

        <nav class="nav-bar">
            <button class="nav-item active" data-view="dashboard">PANEL</button>
            <button class="nav-item" data-view="renders">HISTORIAL</button>
        </nav>
    </div>

    <script src="main.js"></script>
</body>
</html>
