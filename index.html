<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusiChris Atmos | Elite Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- BACKGROUND -->
    <div class="video-bg">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="assets/landscapes/fondo_humo_azul.mp4" type="video/mp4">
        </video>
    </div>
    <div class="overlay"></div>

    <!-- MASTER PANEL -->
    <div class="master-card">
        <div id="system-status-badge" class="status-tag">STANDBY</div>
        
        <header>
            <div class="logo-orb">MC</div>
            <h1>MusiChris <span>Atmos</span></h1>
            <p class="subtitle">Soberanía Digital Ministerial</p>
        </header>

        <!-- VIEW: PANEL -->
        <main id="dashboard" class="view active">
            <div class="section-box">
                <span class="tiny-label">MOMENTO MINISTERIAL</span>
                <h2 id="current-title" class="main-title">Confianza & Fe</h2>
            </div>

            <div class="form-group">
                <div class="field">
                    <span class="tiny-label">LINK DE LA CANCIÓN</span>
                    <input type="text" id="song-url-input" placeholder="Pegar URL de YouTube...">
                </div>

                <div class="field">
                    <span class="tiny-label">ATMÓSFERA</span>
                    <select id="playlist-selector">
                        <option value="Confianza">Confianza & Fe</option>
                        <option value="Paz">Paz Interior</option>
                        <option value="Victoria">Victoria & Gozo</option>
                        <option value="Guerra">Guerra Espiritual</option>
                    </select>
                </div>

                <button id="btn-launch" class="btn-launch">
                    INICIAR PRODUCCIÓN
                </button>
            </div>
        </main>

        <!-- VIEW: CATALOGO -->
        <section id="catalog" class="view">
            <span class="tiny-label">BIBLIOTECA MUSICAL</span>
            <div id="catalog-container" class="list-container" style="margin-top:15px;"></div>
        </section>

        <!-- VIEW: HISTORIAL -->
        <section id="renders" class="view">
            <span class="tiny-label">HISTORIAL DE NUBE</span>
            <div id="renders-container" class="list-container" style="margin-top:15px;"></div>
        </section>

        <!-- NAVIGATION -->
        <nav class="nav-bar">
            <button class="nav-btn active" data-view="dashboard">PANEL</button>
            <button class="nav-btn" data-view="catalog">CATÁLOGO</button>
            <button class="nav-btn" data-view="renders">HISTORIAL</button>
        </nav>
    </div>

    <script src="main.js"></script>
</body>
</html>
